<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สลับกล้อง & สุ่มใบหน้า</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 10px; }
        
        .container { 
            position: relative; 
            width: 100%; 
            max-width: 640px; 
            aspect-ratio: 4/3; 
            margin: 10px auto; 
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .container > video, .container > #canvas { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        button { 
            padding: 12px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold;
            flex: 1;
            max-width: 200px;
        }
        #startBtn { background: #007bff; color: white; }
        #switchBtn { background: #6c757d; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #result { font-size: 18px; font-weight: bold; color: #28a745; min-height: 25px; margin-bottom: 10px; }
        
        #winner-popup {
            display: none; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
            z-index: 10;
            width: 60%;
            max-width: 220px;
        }
        #winner-popup h2 { margin-top: 0; color: #d32f2f; font-size: 20px; }
        #winner-canvas {
            border: 4px solid #ff9800;
            border-radius: 10px;
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <h1 style="font-size: 22px;">สุ่มใบหน้า (รองรับมือถือ)</h1>
    
    <div class="controls">
        <button id="startBtn" onclick="startRandom()" disabled>กำลังโหลด AI...</button>
        <!-- ปุ่มสลับกล้อง -->
        <button id="switchBtn" onclick="toggleCamera()" disabled>🔄 สลับกล้อง</button>
    </div>
    
    <div id="result">กำลังเตรียมระบบ...</div>

    <div class="container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
        
        <div id="winner-popup">
            <h2>ผู้โชคดี! 🎉</h2>
            <canvas id="winner-canvas" width="200" height="200"></canvas>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const resultDiv = document.getElementById('result');
        const startBtn = document.getElementById('startBtn');
        const switchBtn = document.getElementById('switchBtn');
        const winnerPopup = document.getElementById('winner-popup');
        const winnerCanvas = document.getElementById('winner-canvas');
        
        let isRandomizing = false;
        let useFrontCamera = true; // สถานะกล้องปัจจุบัน (true = หน้า, false = หลัง)
        let currentStream = null; // เก็บตัวแปร stream ไว้เพื่อสั่งปิดก่อนสลับกล้อง

        // 1. ฟังก์ชันเปิดกล้อง
        async function startCamera() {
            // ถ้ามีกล้องเปิดอยู่ ให้ปิดก่อนสลับ
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = { 
                video: { 
                    facingMode: useFrontCamera ? 'user' : 'environment' 
                } 
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };
            } catch (err) {
                resultDiv.innerText = "ไม่สามารถเข้าถึงกล้องได้ (เช็ค HTTPS/สิทธิ์)";
                resultDiv.style.color = "red";
                console.error("Camera error:", err);
            }
        }

        // 2. โหลด AI และเริ่มต้นระบบ
        async function init() {
            await startCamera(); // เปิดกล้องก่อน
            
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                
                startBtn.disabled = false;
                switchBtn.disabled = false;
                startBtn.innerText = "เริ่มสุ่มจับภาพ";
                resultDiv.innerText = "พร้อมใช้งาน!";
                resultDiv.style.color = "#007bff";
            } catch (err) {
                resultDiv.innerText = "โหลด AI ไม่สำเร็จ ลองรีเฟรชหน้าจอ";
                resultDiv.style.color = "red";
            }
        }

        // 3. ฟังก์ชันสลับกล้อง
        function toggleCamera() {
            if (isRandomizing) return; // ห้ามสลับตอนกำลังสุ่ม
            useFrontCamera = !useFrontCamera;
            startCamera();
        }

        function startRandom() {
            if (isRandomizing) return;
            isRandomizing = true;
            startBtn.disabled = true;
            switchBtn.disabled = true; // ล็อคปุ่มสลับกล้องตอนสุ่ม
            resultDiv.innerText = "กำลังสุ่มหาใบหน้า...";
            resultDiv.style.color = "#ff9800";
            
            const randomTime = Math.floor(Math.random() * 3000) + 2000; 
            setTimeout(() => { captureFace(); }, randomTime);
        }

        async function captureFace() {
            const context = canvas.getContext('2d');
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
            
            if (detections.length > 0) {
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                video.pause(); 
                
                const randomIndex = Math.floor(Math.random() * detections.length);
                const winnerFace = detections[randomIndex];
                
                showWinner(winnerFace.box);
                
                resultDiv.innerText = `🎉 สุ่มสำเร็จ! (เจอ ${detections.length} คน)`;
                resultDiv.style.color = "#28a745";
                
                startBtn.innerText = "เริ่มใหม่อีกครั้ง";
                startBtn.disabled = false;
                switchBtn.disabled = false;
                startBtn.onclick = resetSystem;
            } else {
                resultDiv.innerText = "⚠️ ไม่พบใบหน้า กำลังหาใหม่...";
                resultDiv.style.color = "#dc3545";
                requestAnimationFrame(captureFace);
            }
        }

        function showWinner(box) {
            const wCtx = winnerCanvas.getContext('2d');
            const padding = 30;
            let sx = Math.max(0, box.x - padding);
            let sy = Math.max(0, box.y - padding);
            let sWidth = Math.min(video.videoWidth - sx, box.width + padding * 2);
            let sHeight = Math.min(video.videoHeight - sy, box.height + padding * 2);

            wCtx.clearRect(0, 0, winnerCanvas.width, winnerCanvas.height);
            wCtx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, winnerCanvas.width, winnerCanvas.height);
            
            winnerPopup.style.display = "block";
        }

        function resetSystem() {
            const context = canvas.getContext('2d');
            context.clearRect(0, 0, canvas.width, canvas.height); 
            winnerPopup.style.display = "none"; 
            video.play(); 
            isRandomizing = false;
            startBtn.innerText = "เริ่มสุ่มจับภาพ";
            startBtn.onclick = startRandom;
            resultDiv.innerText = "พร้อมใช้งาน!";
            resultDiv.style.color = "#007bff";
        }

        // ป้องกันข้อผิดพลาดวิดีโอบนมือถือ
        video.addEventListener('play', () => {});
        init();
    </script>
</body>
</html>
